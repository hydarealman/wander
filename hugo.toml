baseURL = "https://hydarealman.github.io/wander/"
title = "wander"
description = "把日常笔记整理成可检索、可归档的个人博客。"
theme = "PaperMod"
locale = "zh-cn"
defaultContentLanguage = "zh"
hasCJKLanguage = true
enableRobotsTXT = true
enableEmoji = true
timeZone = "Asia/Shanghai"

buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 10

[permalinks]
  posts = "/posts/:year/:month/:slug/"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"

[minify]
  disableXML = true
  minifyOutput = true

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[params]
  env = "production"
  title = "wander"
  description = "把日常笔记整理成可检索、可归档的个人博客。"
  keywords = ["Hugo", "Blog", "Notes", "个人博客"]
  author = "dong"
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  showtoc = true
  tocopen = false
  mainSections = ["posts"]

  [params.homeInfoParams]
    Title = "wander"
    Content = "这里收纳我的技术笔记、复盘、阅读和长期积累。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/hydarealman"

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github"

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 40
