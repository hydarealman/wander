baseURL = "https://hydarealman.github.io/wander/"
title = "wander"
description = "把日常笔记整理成可检索、可归档的个人博客。"
theme = "PaperMod"
locale = "zh-cn"
defaultContentLanguage = "zh"
hasCJKLanguage = true
enableRobotsTXT = true
enableEmoji = true
timeZone = "Asia/Shanghai"

buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 12

[permalinks]
  posts = "/posts/:year/:month/:slug/"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"

[minify]
  disableXML = true
  minifyOutput = true

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[params]
  env = "production"
  title = "wander"
  description = "技术笔记、项目复盘、阅读记录和长期积累。"
  keywords = ["Hugo", "Blog", "Notes", "个人博客", "技术笔记"]
  author = "dong"
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowPageNums = true
  UseHugoToc = true
  showtoc = true
  tocopen = false
  mainSections = ["posts"]
  comments = false
  hideFooter = false

  [params.assets]
    disableHLJS = true

  [params.homeInfoParams]
    Title = "wander"
    Content = "技术笔记、项目复盘、阅读记录和长期积累。"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.35
    minMatchCharLength = 1
    keys = ["title", "permalink", "summary", "content", "tags", "categories"]

  [params.editPost]
    URL = "https://github.com/hydarealman/wander/edit/main/content"
    Text = "编辑此页"
    appendFilePath = true

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/hydarealman"

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github"

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "library"
  name = "索引"
  url = "/library/"
  weight = 15

[[menu.main]]
  identifier = "categories"
  name = "分类"
  url = "/categories/"
  weight = 20

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 30

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 40

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 50

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 60

[[menu.main]]
  identifier = "manual"
  name = "说明"
  url = "/manual/"
  weight = 70
